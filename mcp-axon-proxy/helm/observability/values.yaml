# Default values for the observability chart.
# These are merged on top of kube-prometheus-stack defaults.

kube-prometheus-stack:
  enabled: true

  fullnameOverride: "prom-stack"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    enabled: true
    adminPassword: "dev-admin"
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 200m, memory: 256Mi }
    persistence:
      enabled: false
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts: [grafana.localhost]
      paths: [/]
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: browser
    sidecar:
      dashboards: { enabled: true }
      datasources: { enabled: true }

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 2d
      retentionSize: "4GB"
      storageSpec: {}
      scrapeInterval: "30s"
      evaluationInterval: "30s"
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 512Mi }

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage: {}
      resources:
        requests: { cpu: 10m, memory: 32Mi }
        limits:   { cpu: 50m, memory: 64Mi }
    config:
      global: { resolve_timeout: 5m }
      route:
        group_by: [alertname, namespace]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
      receivers:
        - name: "null"

  # ── Exporters / Metrics ─────────────────────────────────────────────────────
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 50m, memory: 64Mi }

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 50m, memory: 64Mi }

  prometheusOperator:
    enabled: true
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }

  # ── Disabled (not available in k3d) ─────────────────────────────────────────
  kubeEtcd:            { enabled: false }
  kubeControllerManager: { enabled: false }
  kubeScheduler:       { enabled: false }
  kubeProxy:           { enabled: false }

  # ── Alert rules ─────────────────────────────────────────────────────────────
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: false
      configReloaders: true
      general: true
      k8s: true
      kubeApiserverAvailability: true
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubelet: true
      kubeProxy: false
      kubePrometheusGeneral: true
      kubePrometheusNodeRecording: true
      kubernetesApps: true
      kubernetesResources: true
      kubernetesStorage: true
      kubernetesSystem: true
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      kubeStateMetrics: true
      network: true
      node: true
      nodeExporterAlerting: true
      nodeExporterRecording: true
      prometheus: true
      prometheusOperator: true
      windows: false
